# Supabase local dev config
# Run `supabase start` to spin up a local Postgres + Auth stack

[api]
port = 54321

[db]
port = 54322

# Declarative schemas — order matters for foreign key dependencies
[db.migrations]
schema_paths = [
  "./schemas/profiles.sql",
  "./schemas/plaid_items.sql",
  "./schemas/accounts.sql",
  "./schemas/transactions.sql",
]

[studio]
port = 54323

[inbucket]
port = 54324
